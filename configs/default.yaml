data:
  taste_profile: data/raw/train_triplets.txt
  track_metadata_db: data/raw/track_metadata.db
  sid_mismatches: data/raw/sid_mismatches.txt
  lastfm_tags_db: data/raw/lastfm_tags.db
  lastfm_similars_db: data/raw/lastfm_similars.db
  artist_similarity_db: data/raw/artist_similarity.db
  msd_summary_h5: data/raw/msd_summary_file.h5   # optional
  processed_dir: data/processed
  sample_n_users: 2000      # null = full dataset; set int for dev subsampling
  min_play_count: 1          # drop interactions below this threshold
  holdout_k: 10              # interactions randomly withheld per user for val/test
  skip_side_info: false      # set true to skip tags/similars during dev iteration

als:
  factors: 128
  iterations: 20
  regularization: 0.01
  use_gpu: false

gmm:
  k_min: 2
  k_max: 8
  covariance_type: diag
  n_init: 3
  min_songs_per_user: 20     # fallback to single Gaussian below this

scoring:
  default_weights: [0.45, 0.30, 0.15, 0.10]   # [sonic_fit, novelty, persona_specificity, familiarity]

recommend:
  persona_temp: 0.7          # tau: <1 flattens allocation, =1 raw proportional
  min_slots_per_persona: 1
  max_slots_fraction: 0.6
  exploration_fraction: 0.15
  mmr_lambda: 0.7
  max_per_artist: 2
  rerank_top_m: 500          # null = full catalog; persona layer only sees ALS top-M
