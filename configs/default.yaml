data:
  kaggle_csv: data/raw/spotify_tracks.csv
  lastfm_tsv: data/raw/lastfm-dataset-1K/userid-timestamp-artid-artname-traid-traname.tsv
  processed_dir: data/processed
  session_gap_minutes: 30
  min_session_length: 2        # discard sessions with < 2 tracks
  train_split: 0.8             # temporal split per user

features:
  loudness_min: -60.0
  loudness_max: 0.0
  tempo_min: 40.0
  tempo_max: 220.0

model:
  input_dim: 10
  hidden_dims: [64, 48]
  embedding_dim: 16
  dropout: 0.35

training:
  batch_size: 256
  epochs: 50
  lr: 0.001
  weight_decay: 2e-3
  margin: 0.4
  patience: 10
  uniformity_weight: 0.05

gmm:
  k_min: 2
  k_max: 10
  covariance_type: full

scoring:
  default_weights: [0.45, 0.30, 0.15, 0.10]   # [persona_fit, novelty, emotional_fit, familiarity]

recommend:
  persona_temp: 0.7          # tau: <1 flattens allocation, =1 raw proportional
  min_slots_per_persona: 1
  max_slots_fraction: 0.6
  exploration_fraction: 0.15
  mmr_lambda: 0.7
  max_per_artist: 2
